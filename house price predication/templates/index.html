<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>House Price Prediction</title>

    <!-- Bootstrap -->
    <link href="C:\Users\HP\Desktop\house price predication\static\style.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">🏡 House Predictor</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-5">

        <div class="row shadow-lg p-4 rounded bg-white">

            <!-- Image -->
            <div class="col-md-6 text-center">
                <img src="{{ url_for('static', filename='images/house.jpg') }}" class="img-fluid rounded house-img"
                    alt="house">
            </div>

            <!-- Form -->
            <div class="col-md-6">

                <h2 class="text-success mb-3">Enter House Details</h2>

                <form action="/predict" method="POST">

                    <div class="row">

                        <div class="col-6 mb-2">
                            <input type="number" name="bedrooms" class="form-control" placeholder="Bedrooms" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="bathrooms" class="form-control" placeholder="Bathrooms" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="sqft_living" class="form-control" placeholder="Sqft Living"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="sqft_lot" class="form-control" placeholder="Sqft Lot" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="floors" class="form-control" placeholder="Floors" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="waterfront" class="form-control" placeholder="Waterfront (0/1)"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="view" class="form-control" placeholder="View" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="condition" class="form-control" placeholder="Condition" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="grade" class="form-control" placeholder="Grade" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="sqft_above" class="form-control" placeholder="Sqft Above"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="sqft_basement" class="form-control" placeholder="Sqft Basement"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="yr_built" class="form-control" placeholder="Year Built" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="yr_renovated" class="form-control" placeholder="Renovated Year"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="zipcode" class="form-control" placeholder="Zipcode" required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" step="0.0001" name="lat" class="form-control" placeholder="Latitude"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" step="0.0001" name="long" class="form-control" placeholder="Longitude"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="sqft_living15" class="form-control" placeholder="Sqft Living15"
                                required>
                        </div>

                        <div class="col-6 mb-2">
                            <input type="number" name="sqft_lot15" class="form-control" placeholder="Sqft Lot15"
                                required>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-3">
                        Predict Price
                    </button>

                </form>

                {% if prediction_text %}
                <div class="alert alert-info mt-3 text-center">
                    {{ prediction_text }}
                </div>
                {% endif %}

            </div>
        </div>
    </div>

</body>

</html>
